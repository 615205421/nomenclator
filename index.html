<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=yes"><title>批量重命名·极简黑白</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:12px 10px 30px}.box{max-width:600px;margin:0 auto;background:#fff;border:1px solid #ccc;padding:18px 16px 24px}h1{font-size:1.5rem;font-weight:600;margin-bottom:4px;color:#000}h1 span{font-size:0.7rem;font-weight:400;color:#555;margin-left:8px}.sub{color:#333;font-size:0.8rem;border-left:2px solid #888;padding-left:12px;margin:8px 0 18px}.upload-card{background:#f5f5f5;border:1px solid #ccc;padding:24px 12px;text-align:center;cursor:pointer;margin-bottom:20px}.upload-card:active{background:#e0e0e0}.upload-icon{font-size:2rem;color:#000}.upload-text{font-weight:500;font-size:0.9rem;margin-top:4px}.hint{font-size:0.7rem;color:#666;margin-top:6px}#fileInput{display:none}.preview-area{background:#fafafa;border:1px solid #ccc;padding:12px;margin:12px 0 16px;max-height:450px;overflow-y:auto}.preview-header{display:flex;justify-content:space-between;font-weight:600;margin-bottom:12px;font-size:0.8rem;padding:0 4px;color:#000}.file-card{background:#fff;border:1px solid #ddd;padding:12px;margin-bottom:12px}.old-name{background:#f5f5f5;padding:8px 10px;font-size:0.8rem;font-family:monospace;word-break:break-all;margin-bottom:6px;color:#000}.arrow{font-size:0.9rem;text-align:center;margin:4px 0;color:#555}.new-name{background:#eaeaea;padding:8px 10px;font-size:0.8rem;font-weight:500;word-break:break-all;color:#000}.mode-group{display:flex;gap:8px;margin:16px 0 12px;flex-wrap:wrap}.mode-btn{background:#eee;border:1px solid #aaa;padding:8px 14px;font-size:0.8rem;font-weight:500;cursor:pointer;color:#000}.mode-btn.active{background:#000;color:#fff;border-color:#000}.param-panel{background:#fefefe;border:1px solid #ccc;padding:14px 12px;margin-bottom:18px}.param-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px}.param-row label{width:70px;font-size:0.8rem;font-weight:600;color:#000}.param-row input,.param-row select{flex:1;padding:12px 14px;border:1px solid #aaa;font-size:0.85rem;background:#fff;color:#000}.help{font-size:0.65rem;color:#666;margin:4px 0 0 74px}.actions{display:flex;gap:12px;margin:12px 0;flex-direction:column}.actions button{background:#000;border:1px solid #000;padding:14px;font-weight:600;font-size:0.9rem;color:#fff;cursor:pointer;width:100%}.actions button:active{opacity:0.7}.btn-gray{background:#333 !important;border-color:#333 !important}.btn-red{background:#222 !important;border-color:#222 !important}.status{text-align:center;font-size:0.75rem;margin-top:12px;color:#000;background:#f0f0f0;padding:8px}.footer{font-size:0.6rem;text-align:center;color:#666;margin-top:18px;padding-top:12px;border-top:1px solid #ccc}</style></head><body><div class="box"><h1>批量重命名 <span>智能排序·无符号</span></h1><div class="sub">自动按文件名数字排序 → 实时预览 → 直接下载</div><div class="upload-card" id="uploadZone"><div class="upload-icon">+</div><div class="upload-text">点击选择文件 (可多选)</div><div class="hint">手机端多选 · 自动纠正乱序</div><input type="file" id="fileInput" multiple></div><div id="previewWrap" style="display:none;"><div class="preview-area"><div class="preview-header"><span>原文件名 → 新文件名</span><span id="fileCount">0</span></div><div id="fileList"></div></div></div><div class="mode-group"><button class="mode-btn active" data-mode="seq">序号命名</button><button class="mode-btn" data-mode="pre">前缀/后缀</button><button class="mode-btn" data-mode="rep">查找替换</button></div><div id="panelSeq" class="param-panel"><div class="param-row"><label>基础名</label><input type="text" id="baseNameSeq" value="视频" placeholder="基础名"></div><div class="param-row"><label>序号位置</label><select id="seqPos"><option value="right">右侧 (视频01)</option><option value="left">左侧 (01视频)</option></select></div><div class="param-row"><label>起始序号</label><input type="number" id="startSeq" value="1" min="1"></div><div class="param-row"><label>序号长度</label><select id="seqLen"><option value="1">1位</option><option value="2" selected>2位</option><option value="3">3位</option><option value="4">4位</option></select></div><div class="help">示例：视频01 或 01视频（无下划线）</div></div><div id="panelPre" class="param-panel" style="display:none"><div class="param-row"><label>前缀</label><input type="text" id="prefixVal" placeholder="前缀"></div><div class="param-row"><label>后缀</label><input type="text" id="suffixVal" placeholder="后缀"></div><div class="help">前缀 + 原文件名 + 后缀</div></div><div id="panelRep" class="param-panel" style="display:none"><div class="param-row"><label>查找</label><input type="text" id="findVal" placeholder="要替换的文字"></div><div class="param-row"><label>替换为</label><input type="text" id="replaceVal" placeholder="新文字"></div><div class="help">仅替换文件名（不含扩展名）</div></div><div class="actions"><button id="downloadBtn" class="btn-gray">逐个下载重命名后的文件</button><button id="clearBtn" class="btn-red">清空所有文件</button></div><div id="statusMsg" class="status"></div><div class="footer">自动按数字排序(1,2,3...10,11) | 纯本地操作 | 原文件不变</div></div><script>(function(){const I=document.getElementById('fileInput'),Z=document.getElementById('uploadZone'),PW=document.getElementById('previewWrap'),FL=document.getElementById('fileList'),FC=document.getElementById('fileCount'),baseSeq=document.getElementById('baseNameSeq'),posSeq=document.getElementById('seqPos'),startSeq=document.getElementById('startSeq'),lenSeq=document.getElementById('seqLen'),preInput=document.getElementById('prefixVal'),sufInput=document.getElementById('suffixVal'),findInp=document.getElementById('findVal'),repInp=document.getElementById('replaceVal'),downBtn=document.getElementById('downloadBtn'),clearBtn=document.getElementById('clearBtn'),status=document.getElementById('statusMsg');let sortedFiles=[],newList=[];let mode='seq';function extractNumbers(str){const matches=str.match(/\d+/g);if(!matches)return[];return matches.map(Number);}function compareByNumbers(a,b){const numsA=extractNumbers(a.name);const numsB=extractNumbers(b.name);for(let i=0;i<Math.min(numsA.length,numsB.length);i++){if(numsA[i]!==numsB[i])return numsA[i]-numsB[i];}return a.name.localeCompare(b.name);}function splitExt(f){const i=f.lastIndexOf('.');if(i<=0)return{name:f,ext:''};return{name:f.slice(0,i),ext:f.slice(i)}}function buildName(orig,idx){const{name:base,ext}=splitExt(orig);let out='';if(mode==='seq'){let basename=baseSeq.value.trim();if(basename==='')basename='文件';let start=parseInt(startSeq.value,10);if(isNaN(start))start=1;let len=parseInt(lenSeq.value,10);let num=start+idx;let numStr=num.toString();if(len>1&&numStr.length<len)numStr=numStr.padStart(len,'0');let finalNum=numStr;if(posSeq.value==='right')out=basename+finalNum;else out=finalNum+basename;}else if(mode==='pre'){let pre=preInput.value,suf=sufInput.value;out=pre+base+suf;}else if(mode==='rep'){let f=findInp.value,r=repInp.value;if(f==='')out=base;else out=base.split(f).join(r);}if(out==='')out='unnamed';out=out.replace(/[\\/:*?"<>|]/g,'_');return out+ext;}function refresh(){if(!sortedFiles.length){PW.style.display='none';FL.innerHTML='';status.innerHTML='请先选择文件';return;}let arr=[];for(let i=0;i<sortedFiles.length;i++)arr.push(buildName(sortedFiles[i].name,i));newList=arr;let html='';for(let i=0;i<sortedFiles.length;i++){html+=`<div class="file-card"><div class="old-name">${escapeHtml(sortedFiles[i].name)}</div><div class="arrow">▼ 重命名为 ▼</div><div class="new-name">${escapeHtml(newList[i])}</div></div>`;}FL.innerHTML=html;FC.innerText=sortedFiles.length;PW.style.display='block';status.innerHTML=`已按数字排序 (${sortedFiles.length}个文件) → 无多余符号`;}function escapeHtml(s){return s.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}Z.addEventListener('click',()=>I.click());I.addEventListener('change',(e)=>{if(e.target.files&&e.target.files.length){let files=Array.from(e.target.files);files.sort(compareByNumbers);sortedFiles=files;refresh();}});function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach(btn=>{if(btn.dataset.mode===m)btn.classList.add('active');else btn.classList.remove('active');});document.getElementById('panelSeq').style.display=m==='seq'?'block':'none';document.getElementById('panelPre').style.display=m==='pre'?'block':'none';document.getElementById('panelRep').style.display=m==='rep'?'block':'none';if(sortedFiles.length)refresh();}document.querySelectorAll('.mode-btn').forEach(btn=>{btn.addEventListener('click',()=>setMode(btn.dataset.mode));});[baseSeq,posSeq,startSeq,lenSeq,preInput,sufInput,findInp,repInp].forEach(el=>{el.addEventListener('input',()=>{if(sortedFiles.length)refresh();});el.addEventListener('change',()=>{if(sortedFiles.length)refresh();});});clearBtn.addEventListener('click',()=>{sortedFiles=[];newList=[];I.value='';PW.style.display='none';FL.innerHTML='';status.innerHTML='已清空，可重新选择';});downBtn.addEventListener('click',async()=>{if(!sortedFiles.length||!newList.length||sortedFiles.length!==newList.length){status.innerHTML='请先选择文件';return;}status.innerHTML='开始逐个下载，请依次点击保存...';for(let i=0;i<sortedFiles.length;i++){const file=sortedFiles[i];const newName=newList[i];if(!newName)continue;try{const buf=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(new Blob([e.target.result],{type:file.type}));r.onerror=rej;r.readAsArrayBuffer(file);});const url=URL.createObjectURL(buf);const a=document.createElement('a');a.href=url;a.download=newName;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);await new Promise(r=>setTimeout(r,200));}catch(e){status.innerHTML=`下载第${i+1}个失败: ${e.message}`;break;}}status.innerHTML=`已完成 ${sortedFiles.length} 个文件的下载！原文件不变`;});setMode('seq');})();</script></body></html>
